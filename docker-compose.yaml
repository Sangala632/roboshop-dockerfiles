networks:
  default:
    driver: bridge
    name: roboshop
    #external: true #i created already in manual using docker network is roboshop
services:
  mongodb:
    image: sangala2025/mongodb:v1
    container_name: mongodb
  
  catalogue:
    image: sangala2025/catalogue:v1
    container_name: catalogue
    depends_on:
      - mongodb
  
  redis:
    image: sangala2025/redis:v1
    container_name: redis

  user:
    image: sangala2025/user:v1
    container_name: user
    depends_on:
      - mongodb
      - redis
  
  cart:
    image: sangala2025/cart:v1
    container_name: cart
    depends_on:
      - redis
      - catalogue
  
  mysql:
    image: sangala2025/mysql:v1
    container_name: mysql
  
  shipping:
    image: sangala2025/shipping:v1
    container_name: shipping
    depends_on:
      - mysql
      - cart
  rabbitmq:
    image: sangala2025/rabbitmq:v1
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: roboshop 
      RABBITMQ_DEFAULT_PASS: roboshop123
  payment:
    image: sangala2025/payment:v1
    container_name: payment
    environment:
      CART_HOST: cart
      CART_PORT: 8080
      USER_HOST: user
      USER_PORT: 8080
      AMQP_HOST: rabbitmq
      AMQP_USER: roboshop
      AMQP_PASS: roboshop123
    depends_on:
      - cart
      - user
      - rabbitmq
  
  frontend:
    image: sangala2025/frontend:v1
    container_name: frontend 
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - cart
      - user
      - shipping
      - payment
      
