<svg width="100%" viewBox="0 0 680 516" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Browser -->
  <rect x="280" y="30" width="120" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#2C2C2A" x="340" y="52" text-anchor="middle" dominant-baseline="central">Browser</text>

  <!-- Browser → Frontend -->
  <line x1="340" y1="74" x2="340" y2="106" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Frontend -->
  <rect x="100" y="108" width="480" height="56" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#085041" x="340" y="126" text-anchor="middle" dominant-baseline="central">Frontend</text>
  <text font-size="12" fill="#0F6E56" x="340" y="146" text-anchor="middle" dominant-baseline="central">Nginx 1.24 · port 80 · /api/* reverse proxy to services</text>

  <!-- Bus stem -->
  <line x1="340" y1="164" x2="340" y2="184" stroke="#5F5E5A" stroke-width="0.8"/>
  <line x1="96"  y1="184" x2="584" y2="184" stroke="#5F5E5A" stroke-width="0.8"/>
  <line x1="96"  y1="184" x2="96"  y2="197" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="218" y1="184" x2="218" y2="197" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="340" y1="184" x2="340" y2="197" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="462" y1="184" x2="462" y2="197" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="584" y1="184" x2="584" y2="197" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Catalogue -->
  <rect x="42" y="198" width="108" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#0C447C" x="96" y="216" text-anchor="middle" dominant-baseline="central">Catalogue</text>
  <text font-size="12" fill="#185FA5" x="96" y="236" text-anchor="middle" dominant-baseline="central">Node.js 20</text>

  <!-- User -->
  <rect x="164" y="198" width="108" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#0C447C" x="218" y="216" text-anchor="middle" dominant-baseline="central">User</text>
  <text font-size="12" fill="#185FA5" x="218" y="236" text-anchor="middle" dominant-baseline="central">Node.js 20</text>

  <!-- Cart -->
  <rect x="286" y="198" width="108" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#0C447C" x="340" y="216" text-anchor="middle" dominant-baseline="central">Cart</text>
  <text font-size="12" fill="#185FA5" x="340" y="236" text-anchor="middle" dominant-baseline="central">Node.js 20</text>

  <!-- Shipping -->
  <rect x="408" y="198" width="108" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#0C447C" x="462" y="216" text-anchor="middle" dominant-baseline="central">Shipping</text>
  <text font-size="12" fill="#185FA5" x="462" y="236" text-anchor="middle" dominant-baseline="central">Java 21</text>

  <!-- Payment -->
  <rect x="530" y="198" width="108" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#0C447C" x="584" y="216" text-anchor="middle" dominant-baseline="central">Payment</text>
  <text font-size="12" fill="#185FA5" x="584" y="236" text-anchor="middle" dominant-baseline="central">Python 3.11</text>

  <!-- catalogue → MongoDB -->
  <path d="M 96 254 L 80 350" fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <!-- user → MongoDB (L-path) -->
  <path d="M 218 254 L 218 300 L 130 300 L 130 350" fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <!-- user → Redis -->
  <path d="M 218 254 L 261 350" fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <!-- cart → Redis -->
  <path d="M 340 254 L 261 350" fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <!-- shipping → MySQL -->
  <path d="M 462 254 L 417 350" fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <!-- payment → RabbitMQ -->
  <path d="M 584 254 L 573 350" fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- MongoDB -->
  <rect x="40" y="350" width="130" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#633806" x="105" y="368" text-anchor="middle" dominant-baseline="central">MongoDB</text>
  <text font-size="12" fill="#854F0B" x="105" y="388" text-anchor="middle" dominant-baseline="central">mongo:7 · :27017</text>

  <!-- Redis -->
  <rect x="196" y="350" width="130" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#633806" x="261" y="368" text-anchor="middle" dominant-baseline="central">Redis</text>
  <text font-size="12" fill="#854F0B" x="261" y="388" text-anchor="middle" dominant-baseline="central">redis:7 · :6379</text>

  <!-- MySQL -->
  <rect x="352" y="350" width="130" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#633806" x="417" y="368" text-anchor="middle" dominant-baseline="central">MySQL</text>
  <text font-size="12" fill="#854F0B" x="417" y="388" text-anchor="middle" dominant-baseline="central">mysql:8 · :3306</text>

  <!-- RabbitMQ -->
  <rect x="508" y="350" width="130" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#633806" x="573" y="368" text-anchor="middle" dominant-baseline="central">RabbitMQ</text>
  <text font-size="12" fill="#854F0B" x="573" y="388" text-anchor="middle" dominant-baseline="central">rabbitmq:3.13</text>

  <!-- Legend -->
  <rect x="40" y="434" width="600" height="62" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.5"/>
  <rect x="60"  y="447" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="12" fill="#5F5E5A" x="78"  y="453" dominant-baseline="central">Gateway</text>
  <rect x="160" y="447" width="12" height="12" rx="2" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="12" fill="#5F5E5A" x="178" y="453" dominant-baseline="central">App service</text>
  <rect x="276" y="447" width="12" height="12" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text font-size="12" fill="#5F5E5A" x="294" y="453" dominant-baseline="central">Data store</text>
  <line x1="60"  y1="472" x2="90"  y2="472" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text font-size="12" fill="#5F5E5A" x="96"  y="472" dominant-baseline="central">HTTP proxy</text>
  <line x1="210" y1="472" x2="240" y2="472" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text font-size="12" fill="#5F5E5A" x="246" y="472" dominant-baseline="central">Data dependency</text>
  <text font-size="12" fill="#5F5E5A" x="420" y="472" dominant-baseline="central">All on bridge network: roboshop</text>
</svg>
